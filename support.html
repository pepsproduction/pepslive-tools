ion></main><footer class="footer"><div class="container footer-inner"><div data-copyright></div><div>PEPS LIVE • OBS Tools • Sport Production</div></div></footer><script src="assets/app.js"></script><script>(async()=>{const data=await loadSiteData();initCommon(data,'support');const s=data.support||{},wrap=document.getElementById('supportWrap');wrap.innerHTML=`<div class="card" style="padding:28px;border-color:var(--line-o);background:radial-gradient(circle at 88% 12%,rgba(255,90,0,.22),transparent 32%),rgba(255,255,255,.06)"><div class="kicker">Free + Support</div><h3 class="title-xl" style="font-size:clamp(28px,4vw,42px)">${s.title||''}</h3><p class="sub">${s.description||''}</p><p style="color:#ffbf9b;margin-top:14px;line-height:1.8">${s.note||''}</p><div class="link-row" id="supportLinks"></div></div><div class="card" style="padding:28px"><div class="kicker">Detail</div><div id="supportDetails" style="display:grid;gap:10px"></div></div>`;(s.links||[]).forEach((l,i)=>document.getElementById('supportLinks').appendChild(linkEl(l,i===0?'btn btn-primary':'btn btn-ghost')));(s.details||[]).forEach(d=>{const row=document.createElement('div');row.className='card';row.style.padding='14px 16px';row.style.borderRadius='18px';row.innerHTML=`<div style="display:flex;justify-content:space-between;gap:16px"><span style="color:var(--muted)">${d.label||''}</span><strong>${d.value||''}</strong></div>`;document.getElementById('supportDetails').appendChild(row)});})();</script></body></html>
